name: VibeGuard Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull qwen3.5:latest
      
      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Start VibeGuard backend
        run: |
          cd backend
          python main.py &
          sleep 5
      
      - name: Get changed files
        id: changed-files
        run: |
          git diff --name-only origin/${{ github.base_ref }}...${{ github.sha }} | grep -E '\.(py|js|ts|jsx|tsx)$' > changed_files.txt || true
          echo "Changed files:"
          cat changed_files.txt
      
      - name: Scan files
        id: scan
        run: |
          echo "# VibeGuard Security Scan Results" > scan_results.md
          echo "" >> scan_results.md
          
          fail_build=false
          
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              ext="${file##*.}"
              lang="python"
              case "$ext" in
                js) lang="javascript" ;;
                ts) lang="typescript" ;;
                jsx) lang="javascript" ;;
                tsx) lang="typescript" ;;
              esac
              
              code=$(cat "$file" | jq -Rs .)
              response=$(curl -s -X POST http://localhost:8000/scan \
                -H "Content-Type: application/json" \
                -d "{\"code\": $code, \"language\": \"$lang\", \"filename\": \"$file\"}")
              
              trust_score=$(echo "$response" | jq -r '.trust_score')
              risk_level=$(echo "$response" | jq -r '.risk_level')
              summary=$(echo "$response" | jq -r '.summary')
              
              echo "## 📄 \`$file\`" >> scan_results.md
              echo "**Trust Score:** $trust_score/100 | **Risk Level:** $risk_level" >> scan_results.md
              echo "" >> scan_results.md
              echo "$summary" >> scan_results.md
              echo "" >> scan_results.md
              
              vuln_count=$(echo "$response" | jq '.vulnerabilities | length')
              if [ "$vuln_count" -gt 0 ]; then
                echo "### Vulnerabilities Found:" >> scan_results.md
                echo "$response" | jq -r '.vulnerabilities[] | "- **[\(.severity)] \(.title)** (Line \(.line_number))\n  - \(.description)\n  - Fix: \(.fix)\n"' >> scan_results.md
              fi
              
              echo "---" >> scan_results.md
              echo "" >> scan_results.md
              
              if [ "$trust_score" -lt 50 ]; then
                fail_build=true
              fi
            fi
          done < changed_files.txt
          
          if [ "$fail_build" = true ]; then
            echo "fail=true" >> $GITHUB_OUTPUT
          else
            echo "fail=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Comment PR
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('scan_results.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: results
            });
      
      - name: Fail if critical issues found
        if: steps.scan.outputs.fail == 'true'
        run: |
          echo "❌ Security scan failed: One or more files scored below 50"
          exit 1
